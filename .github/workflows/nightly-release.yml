name: Nightly Release

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    name: Build and publish nightly release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        id: setup-go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Cache Go build output
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: ${{ runner.os }}-go-build-${{ steps.setup-go.outputs.go-version }}-${{ hashFiles('go.mod', 'go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-build-${{ steps.setup-go.outputs.go-version }}-
            ${{ runner.os }}-go-build-

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            gobject-introspection \
            libgirepository1.0-dev \
            libgtk-4-dev \
            libvlc-dev \
            pkg-config \
            vlc \
            zip

      - name: Set build metadata
        id: metadata
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::7}"
          {
            echo "short_sha=$short_sha"
            echo "archive=radioplayer-linux-amd64-${short_sha}.zip"
            echo "tag=nightly-$short_sha"
            echo "version=nightly-$short_sha"
            echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } >> "$GITHUB_OUTPUT"

      - name: Build binary
        run: make BUILD_VERSION="${{ steps.metadata.outputs.version }}" BUILD_DATE="${{ steps.metadata.outputs.date }}" build

      - name: Package binary
        shell: bash
        run: |
          archive="${{ steps.metadata.outputs.archive }}"

          strip radioplayer
          zip -j "$archive" radioplayer

      - name: Create nightly release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.metadata.outputs.tag }}"
          archive="${{ steps.metadata.outputs.archive }}"
          short_sha="${{ steps.metadata.outputs.short_sha }}"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "$archive" --clobber
          else
            gh release create "$tag" "$archive" \
              --title "Nightly $short_sha" \
              --notes "Automated nightly build for commit $GITHUB_SHA." \
              --target "$GITHUB_SHA" \
              --prerelease
          fi

      - name: Keep last 10 nightly releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release list --limit 100 --json tagName,createdAt \
            --jq '. | map(select(.tagName | startswith("nightly-"))) | sort_by(.createdAt) | reverse | .[10:] | .[].tagName' |
          while read -r tag; do
            [ -n "$tag" ] || continue
            gh release delete "$tag" --cleanup-tag --yes
          done
